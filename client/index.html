<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23ff4444'/><g stroke='%23fff' stroke-width='1.2' stroke-linecap='round' fill='none'><path d='M8 11.5L11.5 14L8 15.5'/><path d='M24 11.5L20.5 14L24 15.5'/></g><circle cx='10' cy='14' r='1' fill='%23fff'/><circle cx='22' cy='14' r='1' fill='%23fff'/><path d='M10.5 20.5L13 22L15.5 20L18 22L21.5 20.5' stroke='%23fff' stroke-width='1' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Mona+Sans:wdth,wght@75..125,400..700&display=swap" rel="stylesheet" />
  <title>Orbeats</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; touch-action: manipulation; font-family: 'Mona Sans', sans-serif; font-variation-settings: "wdth" 100; }
    canvas { display: block; }

    /* ── Name tags (HTML overlay) ───────────────────── */
    .nameTag {
      position: absolute;
      transform: translate(-50%, -100%);
      font-family: 'Mona Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7), 0 0 6px rgba(0,0,0,0.3);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }

    #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    /* ── Join Screen ──────────────────────────────── */
    #join-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      z-index: 100;
      font-family: 'Mona Sans', sans-serif;
    }
    #join-screen .logo {
      height: 64px; width: auto; margin-bottom: 32px;
      filter: drop-shadow(0 0 30px rgba(255,100,100,0.5));
    }
    #join-screen input {
      width: 280px; padding: 14px 20px; font-size: 18px;
      border: 2px solid rgba(255,255,255,0.2); border-radius: 30px;
      background: rgba(255,255,255,0.08); color: #fff;
      outline: none; text-align: center;
      margin-bottom: 20px;
    }
    #join-screen input::placeholder { color: rgba(255,255,255,0.4); }
    #join-screen input:focus { border-color: rgba(255,100,100,0.6); }
    #join-screen button {
      width: 280px; padding: 14px; font-size: 20px; font-weight: bold;
      font-variation-settings: "wdth" 125;
      border: none; border-radius: 30px; cursor: pointer;
      background: linear-gradient(135deg, #ff4444, #ff6b35);
      color: #fff; letter-spacing: 2px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(255,68,68,0.4);
    }
    #join-screen button:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(255,68,68,0.6); }
    .join-error {
      margin-top: 16px; max-width: 320px; font-size: 14px; color: rgba(255,200,100,0.95);
      text-align: center; line-height: 1.5;
    }

    /* ── HUD ──────────────────────────────────────── */
    #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; font-family: 'Mona Sans', sans-serif; display: none; }
    #hud.active { display: block; }

    #trophy-badge {
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #ff9900, #ff6600);
      padding: 8px 16px; border-radius: 24px;
      color: #fff; font-size: 15px; font-weight: 700;
      box-shadow: 0 4px 16px rgba(255,153,0,0.4);
    }
    #trophy-score { font-variation-settings: "wdth" 125; }
    #trophy-badge svg { width: 20px; height: 20px; fill: #fff; }

    /* ── Bottom-left: trophy ─────────────────────────────── */
    #bottom-left-area {
      position: absolute; bottom: 24px; left: 24px;
      display: flex; align-items: center; gap: 12px;
      pointer-events: none;
    }
    #bottom-left-area > * { pointer-events: auto; }

    /* ── Bottom-right: session timeline (progress bar + End Game hover) ─── */
    #bottom-right-area {
      position: absolute; bottom: 24px; right: 24px;
      display: flex; align-items: center; justify-content: flex-end;
      pointer-events: none;
    }
    #bottom-right-area > * { pointer-events: auto; }
    #session-timeline-wrap {
      display: flex; align-items: center; gap: 8px;
    }
    #session-timeline {
      position: relative;
      width: 160px; height: 36px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      overflow: hidden;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }
    #session-timeline:hover {
      background: rgba(0,0,0,0.65);
      border-color: rgba(255,255,255,0.25);
    }
    #session-timeline.morph-end-game {
      width: 120px; min-width: 120px;
      background: rgba(0, 0, 0, 0.75);
      border-color: rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
    }
    #session-timeline.morph-end-game .timeline-bar-wrap,
    #session-timeline.morph-end-game .timeline-label { display: none; }
    #session-timeline.morph-end-game .end-game-label { display: block; }
    .timeline-bar-wrap {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 56px 0 12px;
      gap: 4px;
    }
    .timeline-bar-bg {
      height: 6px; background: rgba(255,255,255,0.2);
      border-radius: 3px; overflow: hidden;
    }
    .timeline-bar-fill {
      height: 100%; background: #ff8a00;
      border-radius: 3px;
      transition: width 0.25s, background 0.25s;
    }
    .timeline-bar-fill.warn {
      background: #e53935;
      animation: timeline-pulse 1.5s ease-in-out infinite;
    }
    @keyframes timeline-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    .timeline-label {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.9);
      font-variation-settings: "wdth" 125;
    }
    .end-game-label {
      display: none;
      font-size: 12px; font-weight: 600;
      color: #fff; letter-spacing: 1px;
      font-variation-settings: "wdth" 125;
    }
    #session-timeline-mobile-menu {
      display: none;
      width: 32px; height: 36px;
      font-variation-settings: "wdth" 125;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #fff; font-size: 18px;
      cursor: pointer;
      align-items: center; justify-content: center;
    }
    @media (hover: hover) {
      #session-timeline-mobile-menu { display: none !important; }
    }
    @media (hover: none) {
      #session-timeline-mobile-menu { display: flex; }
    }

    #leaderboard {
      position: absolute; top: 20px; right: 20px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      border-radius: 14px; padding: 12px 16px; min-width: 180px;
      color: #fff; font-size: 12px;
    }
    #leaderboard h3 { margin-bottom: 8px; font-size: 13px; opacity: 0.8; letter-spacing: 1px; }
    #leaderboard-list { list-style: none; }
    #leaderboard-list li {
      padding: 3px 0; display: flex; justify-content: space-between; gap: 10px; font-size: 12px;
    }
    #leaderboard-list li:not(:last-child) {
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #leaderboard-list li.me { font-weight: 700; }
    #leaderboard-list li.me .rank { color: rgba(255,255,255,0.6); }
    #leaderboard-list li.me .name {
      background: linear-gradient(135deg, #F09736, #ED752F);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    #leaderboard-list li.me .lb-score {
      background: linear-gradient(135deg, #F09736, #ED752F);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    #leaderboard-list li .rank { opacity: 0.5; min-width: 20px; font-variation-settings: "wdth" 125; }
    #leaderboard-list li .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #leaderboard-list li .lb-score { font-weight: 600; font-variation-settings: "wdth" 125; }

    /* ── Death / Game Over overlay ─────────────────── */
    #death-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); display: none;
      align-items: center; justify-content: center;
      z-index: 50;
      font-family: 'Mona Sans', sans-serif; color: #fff;
      backdrop-filter: blur(6px);
    }
    #death-overlay.active { display: flex; }
    .death-panel {
      background: rgba(20,20,40,0.92);
      border-radius: 20px;
      padding: 40px 48px;
      text-align: center;
      min-width: 340px;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .death-panel h2 {
      font-size: 42px; margin-bottom: 8px; color: #ff4444;
      letter-spacing: 3px; text-shadow: 0 0 20px rgba(255,68,68,0.4);
    }
    #death-msg { font-size: 16px; opacity: 0.6; margin-bottom: 24px; }
    .death-score-row {
      display: flex; justify-content: center; align-items: baseline; gap: 12px;
      margin-bottom: 24px;
    }
    .death-label { font-size: 16px; opacity: 0.5; }
    .death-value { font-size: 36px; font-weight: 700; color: #ff9900; font-variation-settings: "wdth" 125; }
    .death-highscores { margin-bottom: 28px; }
    .death-highscores h3 { font-size: 14px; opacity: 0.5; letter-spacing: 2px; margin-bottom: 12px; }
    /* Toggle mode: no constraint when collapsed. Scroll mode: always scroll. Toggle expanded: scroll. */
    .death-highscore-list-wrap.score-list-scroll,
    .death-highscore-list-wrap.score-list-expanded {
      max-height: 260px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    #death-highscore-list { list-style: none; padding: 0; }
    #death-highscore-list li {
      display: flex; justify-content: space-between; gap: 16px;
      padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 15px;
    }
    #death-highscore-list li .hs-rank { opacity: 0.4; min-width: 24px; text-align: left; font-variation-settings: "wdth" 125; }
    #death-highscore-list li .hs-name { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #death-highscore-list li .hs-score { font-weight: 600; color: #ff9900; font-variation-settings: "wdth" 125; }
    #death-highscore-list li.highlight { color: #ff4444; font-weight: 700; }
    #death-play-btn {
      padding: 14px 40px; font-size: 18px; font-weight: 700;
      font-variation-settings: "wdth" 125;
      border: none; border-radius: 30px; cursor: pointer;
      background: linear-gradient(135deg, #ff4444, #ff6b35);
      color: #fff; letter-spacing: 2px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(255,68,68,0.4);
    }
    #death-play-btn:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(255,68,68,0.6); }
    #death-play-btn:active { transform: scale(0.97); }
    .death-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .death-no-scores { font-size: 14px; opacity: 0.3; font-style: italic; }
    .death-show-more-btn {
      margin-top: 8px; padding: 6px 0; font-size: 13px; color: rgba(255,255,255,0.7);
      background: none; border: none; cursor: pointer; text-decoration: underline;
    }
    .death-show-more-btn:hover { color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <!-- Join Screen -->
  <div id="join-screen" data-ui>
    <img src="/logo.svg" alt="Orbeats" class="logo" />
    <input type="text" id="name-input" placeholder="Enter your name..." maxlength="16" />
    <button id="join-btn" data-ui>PLAY</button>
    <p id="join-error" class="join-error" style="display:none;"></p>
  </div>

  <!-- HUD -->
  <div id="hud" data-ui>
    <div id="leaderboard">
      <h3>LEADERBOARD</h3>
      <ul id="leaderboard-list"></ul>
    </div>

    <div id="bottom-left-area">
      <div id="trophy-badge">
        <svg viewBox="0 0 24 24"><path d="M12 2C9.24 2 7 4.24 7 7h2c0-1.66 1.34-3 3-3s3 1.34 3 3h2c0-2.76-2.24-5-5-5zM5 7c-1.1 0-2 .9-2 2v2c0 2.76 2.24 5 5 5v2H6v2h12v-2h-2v-2c2.76 0 5-2.24 5-5V9c0-1.1-.9-2-2-2h-1.18C17.93 7.31 18 7.65 18 8H6c0-.35.07-.69.18-1H5zm0 2h1v2c0 1.66 1.34 3 3 3h6c1.66 0 3-1.34 3-3V9h1v2c0 1.66-1.34 3-3 3H8c-1.66 0-3-1.34-3-3V9z"/></svg>
        <span id="trophy-score">0</span>
      </div>
    </div>
    <div id="bottom-right-area">
      <div id="session-timeline-wrap">
        <div id="session-timeline" data-ui>
          <div class="timeline-bar-wrap">
            <div class="timeline-bar-bg">
              <div class="timeline-bar-fill" id="timeline-bar-fill" style="width: 100%;"></div>
            </div>
          </div>
          <span class="timeline-label" id="timeline-label">3:00</span>
          <span class="end-game-label">END GAME</span>
        </div>
        <button type="button" id="session-timeline-mobile-menu" data-ui title="End game">⋯</button>
      </div>
    </div>
  </div>

  <!-- Death / Game Over overlay -->
  <div id="death-overlay" data-ui>
    <div class="death-panel">
      <h2 id="death-panel-title">GAME OVER</h2>
      <p id="death-msg">Eaten by someone</p>
      <div class="death-score-row">
        <span class="death-label">Your Score</span>
        <span id="death-score-value" class="death-value">0</span>
      </div>
      <div class="death-highscores">
        <h3>TOP SCORES TODAY</h3>
        <div class="death-highscore-list-wrap" id="death-highscore-list-wrap">
          <ol id="death-highscore-list"></ol>
        </div>
        <button type="button" class="death-show-more-btn" id="death-show-more-btn" data-ui style="display:none;">Show more</button>
      </div>
      <div class="death-buttons">
        <button id="death-play-btn" data-ui>START NEW GAME</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
