  <style>
    :root {
      --or-bg: #cfd1da;
      --or-surface: #35353b;
      --or-surface-2: #3f3f46;
      --or-border: rgba(255, 255, 255, 0.1);
      --or-text: #fafafa;
      --or-muted: rgba(255, 255, 255, 0.55);
      --or-accent: #f97316;
      --or-gradient-btn: linear-gradient(91deg, #f09736 1.8%, #ed752f 100%);
      --or-gradient-btn-hover: linear-gradient(91deg, #f5a85a 1.8%, #f08545 100%);
      --or-shadow-btn: 0 2px 24px 0 rgba(255, 145, 25, 0.6);
      --or-shadow-btn-hover: 0 4px 28px 0 rgba(255, 145, 25, 0.72);
      --or-radius-btn: 30px;
      --or-radius: 4px;
      --or-modal-bg: #dddddd;
      --or-font: 'Plus Jakarta Sans', 'DM Sans', system-ui, sans-serif;
      --or-font-body: 'DM Sans', 'Plus Jakarta Sans', system-ui, sans-serif;
      --or-font-mona: 'Mona Sans', system-ui, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--or-bg); touch-action: manipulation; font-family: var(--or-font-body); font-size: 15px; }
    canvas { display: block; }

    /* ── Name tags (HTML overlay) ───────────────────── */
    .nameTag {
      position: absolute;
      transform: translate(-50%, -100%);
      font-family: var(--or-font);
      font-size: 12px;
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7), 0 0 6px rgba(0,0,0,0.3);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }

    #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

    /* ── Bounty arrow ─────────────────────────────────── */
    #bounty-arrow {
      position: fixed;
      z-index: 490;
      pointer-events: none;
      display: none;
      /* Pre-composited layer — avoids promotion jank on first frame */
      will-change: transform;
      /* Color is set dynamically by BountyArrow.ts to match the target's blob color */
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
      animation: bounty-arrow-pulse 1.4s ease-in-out infinite;
    }
    @keyframes bounty-arrow-pulse {
      0%, 100% { opacity: 0.75; }
      50%       { opacity: 1;    }
    }

    /* ── Bounty toast ──────────────────────────────────── */
    #bounty-toast {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      z-index: 500;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--or-radius);
      font-size: 13px;
      font-family: var(--or-font);
      line-height: 1.5;
      text-align: center;
      pointer-events: none;
      /* Pre-composited — will-change avoids promotion jank on first show */
      will-change: opacity, transform;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      white-space: nowrap;
    }
    #bounty-toast.bounty-toast-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    /* Subtle coloured bottom border per toast type */
    #bounty-toast::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--or-radius);
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
    }
    #bounty-toast.bounty-toast-target::after { border-color: rgba(255, 180, 40, 0.35); }
    #bounty-toast.bounty-toast-bonus::after  { border-color: rgba(80, 255, 130, 0.35); }

    /* ── Join Screen (modal overlay, session screenshot as background) ──────────────────────────────── */
    #join-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      /* Visible only until screenshot loads — avoids stacking dark layers on top of the image */
      background: linear-gradient(rgba(32, 32, 36, 0.72), rgba(32, 32, 36, 0.78));
      z-index: 100;
      font-family: var(--or-font-mona);
    }
    #join-screen:has(.join-bg.loaded) {
      background: transparent;
    }
    .join-bg {
      position: absolute; inset: 0; z-index: 0; overflow: hidden;
    }
    .join-bg img {
      width: 100%; height: 100%; object-fit: cover;
      opacity: 0; transition: opacity 0.6s ease-out;
    }
    .join-bg.loaded img { opacity: 1; }
    /* 50% dim — same over screenshot and live WebGL preview */
    .join-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: rgba(0, 0, 0, 0.5);
      pointer-events: none;
      transition: opacity 1.2s ease-out;
    }
    /* When live canvas is ready: fade static image out; overlay stays 50% */
    #join-screen.entry-live-ready .join-bg img { opacity: 0; transition: opacity 1.2s ease-out; }
    #join-screen.hidden { display: none; }
    .join-modal-panel {
      position: relative; z-index: 2;
      background: var(--or-modal-bg);
      border-radius: 0;
      padding: 40px 48px;
      text-align: center;
      min-width: 320px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.22);
      border: 1px solid rgba(0, 0, 0, 0.08);
      display: flex; flex-direction: column; align-items: center;
    }
    #join-screen .logo {
      height: 56px; width: auto; margin-bottom: 28px;
      filter: brightness(0);
    }
    #join-screen input {
      width: 280px; max-width: 92vw; padding: 14px 22px; font-size: 15px; font-weight: 600;
      border: 1px solid rgba(0, 0, 0, 0.12); border-radius: 9999px;
      background: #fff; color: #18181b;
      outline: none; text-align: center;
      margin-bottom: 18px;
      font-family: var(--or-font-mona);
      font-variation-settings: 'wdth' 100;
      letter-spacing: 0.04em;
    }
    /* Placeholder zostáva uppercase; napísaný text nie je nútený na veľké písmená */
    #join-screen input::placeholder {
      color: rgba(0, 0, 0, 0.38);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    #join-screen input:focus {
      border-color: rgba(234, 88, 12, 0.55);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
    }
    #join-screen button {
      width: 280px; max-width: 92vw; padding: 14px 20px; font-size: 17px; font-weight: 800;
      font-family: var(--or-font-mona);
      font-variation-settings: 'wdth' 125;
      border: none; border-radius: var(--or-radius-btn); cursor: pointer;
      background: var(--or-gradient-btn);
      color: #fff; letter-spacing: 0.14em; text-transform: uppercase;
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s, background 0.15s;
      box-shadow: var(--or-shadow-btn);
    }
    #join-screen button:hover {
      transform: translateY(-1px);
      background: var(--or-gradient-btn-hover);
      box-shadow: var(--or-shadow-btn-hover);
    }
    #join-screen button:disabled:hover { transform: none; }
    #join-screen .join-spinner {
      display: inline-block; width: 22px; height: 22px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: join-spin 0.7s linear infinite;
    }
    @keyframes join-spin { to { transform: rotate(360deg); } }
    .join-error {
      margin-top: 16px; max-width: 280px; font-size: 14px; color: #c2410c;
      text-align: center; line-height: 1.5;
    }
    /* Fixed footer links on entry — no background, above canvas overlay */
    .join-entry-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 102;
      padding: 16px 20px 22px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 6px 4px;
      font-size: 12px;
      pointer-events: none;
    }
    .join-entry-footer a {
      pointer-events: auto;
      color: rgba(255, 255, 255, 0.45);
      text-decoration: none;
      padding: 4px 8px;
    }
    .join-entry-footer a:hover { color: rgba(255, 107, 53, 0.95); }
    .join-entry-footer .sep { color: rgba(255, 255, 255, 0.2); user-select: none; padding: 0 2px; }
    #join-screen.hidden .join-entry-footer { display: none; }

    /* ── HUD ──────────────────────────────────────── */
    #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; font-family: var(--or-font); display: none; }
    #hud.active { display: block; }

    #trophy-badge {
      display: flex; align-items: center; gap: 8px;
      background: var(--or-gradient-btn);
      padding: 8px 16px; border-radius: var(--or-radius-btn);
      color: #fff; font-size: 14px; font-weight: 700;
      box-shadow: var(--or-shadow-btn);
    }
    #trophy-score { font-weight: 700; }
    #trophy-badge svg { width: 20px; height: 20px; fill: #fff; }

    /* ── Bottom-left: trophy ─────────────────────────────── */
    #bottom-left-area {
      position: absolute; bottom: 24px; left: 24px;
      display: flex; align-items: center; gap: 12px;
      pointer-events: none;
    }
    #bottom-left-area > * { pointer-events: auto; }

    /* ── Bottom-right: session timeline (progress bar + End Game hover) ─── */
    #bottom-right-area {
      position: absolute; bottom: 24px; right: 24px;
      display: flex; align-items: center; justify-content: flex-end;
      pointer-events: none;
    }
    #bottom-right-area > * { pointer-events: auto; }
    #session-timeline-wrap {
      display: flex; align-items: center; gap: 8px;
    }
    #session-timeline {
      position: relative;
      width: 160px; height: 36px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      border-radius: var(--or-radius);
      border: 1px solid var(--or-border);
      overflow: hidden;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }
    #session-timeline:hover {
      background: rgba(0,0,0,0.65);
      border-color: rgba(255,255,255,0.25);
    }
    #session-timeline.morph-end-game {
      width: 120px; min-width: 120px;
      background: rgba(0, 0, 0, 0.75);
      border-color: rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
    }
    #session-timeline.morph-end-game .timeline-bar-wrap,
    #session-timeline.morph-end-game .timeline-label { display: none; }
    #session-timeline.morph-end-game .end-game-label { display: block; }
    .timeline-bar-wrap {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 56px 0 12px;
      gap: 4px;
    }
    .timeline-bar-bg {
      height: 6px; background: rgba(255,255,255,0.2);
      border-radius: 3px; overflow: hidden;
    }
    .timeline-bar-fill {
      height: 100%; background: #ff8a00;
      border-radius: 3px;
      transition: width 0.25s, background 0.25s;
    }
    .timeline-bar-fill.warn {
      background: #e53935;
      animation: timeline-pulse 1.5s ease-in-out infinite;
    }
    @keyframes timeline-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    .timeline-label {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.9);
    }
    .end-game-label {
      display: none;
      font-size: 12px; font-weight: 600;
      color: #fff; letter-spacing: 1px;
    }
    #session-timeline-mobile-menu {
      display: none;
      width: 32px; height: 36px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      border: 1px solid var(--or-border);
      border-radius: var(--or-radius);
      color: #fff; font-size: 18px;
      cursor: pointer;
      align-items: center; justify-content: center;
    }
    @media (hover: hover) {
      #session-timeline-mobile-menu { display: none !important; }
    }
    @media (hover: none) {
      #session-timeline-mobile-menu { display: flex; }
    }

    #leaderboard {
      position: absolute; top: 20px; right: 20px;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
      border-radius: var(--or-radius); padding: 12px 16px; min-width: 180px;
      color: var(--or-text); font-size: 12px;
      border: 1px solid var(--or-border);
    }
    #leaderboard-list { list-style: none; }
    #leaderboard-list li {
      padding: 3px 0; display: flex; justify-content: space-between; gap: 10px; font-size: 12px;
    }
    #leaderboard-list li:not(:last-child) {
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #leaderboard-list li.me { font-weight: 700; }
    #leaderboard-list li.me .rank { color: rgba(255,255,255,0.6); }
    #leaderboard-list li.me .name {
      background: var(--or-gradient-btn);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    #leaderboard-list li.me .lb-score {
      background: var(--or-gradient-btn);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    #leaderboard-list li .rank { opacity: 0.5; min-width: 20px; }
    #leaderboard-list li .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #leaderboard-list li .lb-score { font-weight: 600; }

    /* ── Death / Game Over overlay ─────────────────── */
    #death-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: transparent; display: none;
      align-items: center; justify-content: center;
      z-index: 60;
      font-family: var(--or-font-mona); color: #18181b;
    }
    #death-overlay.active { display: flex; }
    .death-panel {
      background: var(--or-modal-bg);
      border-radius: 0;
      padding: 40px 48px;
      text-align: center;
      min-width: 340px;
      max-width: 420px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.22);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .death-panel h2 {
      font-size: 36px; margin-bottom: 8px; color: #ea580c;
      letter-spacing: 0.08em; font-weight: 800;
      font-variation-settings: 'wdth' 115;
    }
    #death-msg { font-size: 16px; color: rgba(0, 0, 0, 0.55); margin-bottom: 24px; }
    .death-score-row {
      display: flex; justify-content: center; align-items: baseline; gap: 12px;
      margin-bottom: 24px;
    }
    .death-label { font-size: 16px; color: rgba(0, 0, 0, 0.45); }
    .death-value { font-size: 36px; font-weight: 700; color: #fb923c; }
    .death-highscores { margin-bottom: 28px; }
    .death-highscores h3 { font-size: 14px; color: rgba(0, 0, 0, 0.45); letter-spacing: 2px; margin-bottom: 12px; }
    /* Toggle mode: no constraint when collapsed. Scroll mode: always scroll. Toggle expanded: scroll. */
    .death-highscore-list-wrap.score-list-scroll,
    .death-highscore-list-wrap.score-list-expanded {
      max-height: 260px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    #death-highscore-list { list-style: none; padding: 0; }
    #death-highscore-list li {
      display: flex; justify-content: space-between; gap: 16px;
      padding: 6px 0; border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      font-size: 15px;
      color: #27272a;
    }
    #death-highscore-list li .hs-rank { color: rgba(0, 0, 0, 0.4); min-width: 24px; text-align: left; }
    #death-highscore-list li .hs-name { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #death-highscore-list li .hs-score { font-weight: 600; color: #fb923c; }
    #death-highscore-list li.highlight { color: #c2410c; font-weight: 700; }
    #death-play-btn {
      padding: 14px 40px; font-size: 16px; font-weight: 800;
      font-family: var(--or-font-mona);
      font-variation-settings: 'wdth' 125;
      border: none; border-radius: var(--or-radius-btn); cursor: pointer;
      background: var(--or-gradient-btn);
      color: #fff; letter-spacing: 0.12em; text-transform: uppercase;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      box-shadow: var(--or-shadow-btn);
    }
    #death-play-btn:hover {
      transform: translateY(-1px);
      background: var(--or-gradient-btn-hover);
      box-shadow: var(--or-shadow-btn-hover);
    }
    #death-play-btn:active { transform: scale(0.97); }
    .death-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .death-no-scores { font-size: 14px; color: rgba(0, 0, 0, 0.35); font-style: italic; }
    .death-show-more-btn {
      margin-top: 8px; padding: 6px 0; font-size: 13px; color: rgba(0, 0, 0, 0.55);
      background: none; border: none; cursor: pointer; text-decoration: underline;
    }
    .death-show-more-btn:hover { color: #ea580c; }
  </style>
</head>

  <div id="game-viewport" style="height: 100vh; min-height: 100vh; overflow: hidden; position: relative;">
  <!-- Join Screen (modal overlay, session screenshot as background with fade-in) -->
  <div id="join-screen" data-ui>
    <div class="join-bg" id="join-bg">
      <img src="/join-bg.png" alt="" loading="lazy" decoding="async" onload="this.parentElement.classList.add('loaded')" />
    </div>
    <div class="join-overlay"></div>
    <div class="join-modal-panel">
      <img src="/logo.svg" alt="Orbeats" class="logo" />
      <input type="text" id="name-input" placeholder="ENTER YOUR NAME" maxlength="16" autocomplete="username" />
      <button id="join-btn" data-ui>PLAY</button>
      <p id="join-error" class="join-error" style="display:none;"></p>
    </div>
    <nav class="join-entry-footer" aria-label="Legal and info">
      <a href="/privacy">Privacy Policy</a><span class="sep">·</span>
      <a href="/terms">Terms of Service</a><span class="sep">·</span>
      <a href="/how-to-play">How to play</a><span class="sep">·</span>
      <a href="/contact">Contact</a>
    </nav>
  </div>

  <!-- HUD -->
  <div id="hud" data-ui>
    <div id="leaderboard">
      <ul id="leaderboard-list"></ul>
    </div>

    <div id="bottom-left-area">
      <div id="trophy-badge">
        <svg viewBox="0 0 24 24"><path d="M12 2C9.24 2 7 4.24 7 7h2c0-1.66 1.34-3 3-3s3 1.34 3 3h2c0-2.76-2.24-5-5-5zM5 7c-1.1 0-2 .9-2 2v2c0 2.76 2.24 5 5 5v2H6v2h12v-2h-2v-2c2.76 0 5-2.24 5-5V9c0-1.1-.9-2-2-2h-1.18C17.93 7.31 18 7.65 18 8H6c0-.35.07-.69.18-1H5zm0 2h1v2c0 1.66 1.34 3 3 3h6c1.66 0 3-1.34 3-3V9h1v2c0 1.66-1.34 3-3 3H8c-1.66 0-3-1.34-3-3V9z"/></svg>
        <span id="trophy-score">0</span>
      </div>
    </div>
    <div id="bottom-right-area">
      <div id="session-timeline-wrap">
        <div id="session-timeline" data-ui>
          <div class="timeline-bar-wrap">
            <div class="timeline-bar-bg">
              <div class="timeline-bar-fill" id="timeline-bar-fill" style="width: 100%;"></div>
            </div>
          </div>
          <span class="timeline-label" id="timeline-label">3:00</span>
          <span class="end-game-label">END GAME</span>
        </div>
        <button type="button" id="session-timeline-mobile-menu" data-ui title="End game">⋯</button>
      </div>
    </div>
  </div>

  <!-- Bounty toast — pre-rendered so backdrop-filter is already composited -->
  <div id="bounty-toast" aria-live="polite"></div>

  <!-- Bounty arrow — pre-rendered so will-change layer is already promoted -->
  <div id="bounty-arrow">
    <!--
      Triangle pointing RIGHT (angle=0). JS rotates via transform: rotate(Xrad).
      The shape is a right-pointing arrow chevron.
    -->
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none">
      <polygon points="5,3 21,12 5,21" fill="rgba(255,255,255,0.9)" />
    </svg>
  </div>

  <!-- Death / Game Over overlay -->
  <div id="death-overlay" data-ui>
    <div class="death-panel">
      <h2 id="death-panel-title">GAME OVER</h2>
      <p id="death-msg">Eaten by someone</p>
      <div class="death-score-row">
        <span class="death-label">Your Score</span>
        <span id="death-score-value" class="death-value">0</span>
      </div>
      <div class="death-highscores">
        <h3>TOP SCORES TODAY</h3>
        <div class="death-highscore-list-wrap" id="death-highscore-list-wrap">
          <ol id="death-highscore-list"></ol>
        </div>
        <button type="button" class="death-show-more-btn" id="death-show-more-btn" data-ui style="display:none;">Show more</button>
      </div>
      <div class="death-buttons">
        <button id="death-play-btn" data-ui>START NEW GAME</button>
      </div>
    </div>
  </div>

  <div id="analytics-root"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
